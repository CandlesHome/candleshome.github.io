<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candles Home</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:sans-serif;
  color:#fff;
  background:url('Loft.jpg') center/cover no-repeat;
}

.brand{
  text-align:center;
  padding:100px 20px;
  border-radius:25px;
}

.section{
  padding:40px 20px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:rgba(0,0,0,.6);
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.carousel img{
  width:100%;
  display:none;
}
.carousel img.active{
  display:block;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
}

.order{
  background:rgba(0,0,0,.6);
  padding:30px;
  border-radius:20px;
  max-width:400px;
  margin:40px auto;
}

input,select{
  width:100%;
  margin:10px 0;
  padding:10px;
}
</style>
</head>

<body>

<section class="brand">
  <h1>Candles Home</h1>
  <p>Твій простір заслуговує більше, ніж просто світло</p>
</section>

<section class="section">
  <div class="grid">

    <div class="card">
      <div class="carousel">
        <img src="black1.jpg" class="active">
        <img src="black2.jpg">
        <img src="black3.jpg">
      </div>
      <h3>Аромасвічка з таємним написом</h3>
      <p>Чорна</p>
      <div>180 грн</div>
      <button onclick="choose('black')">Обрати</button>
    </div>

    <div class="card">
      <div class="carousel">
        <img src="white1.jpg" class="active">
        <img src="white2.jpg">
        <img src="white3.jpg">
      </div>
      <h3>Аромасвічка з таємним написом</h3>
      <p>Біла</p>
      <div>180 грн</div>
      <button onclick="choose('white')">Обрати</button>
    </div>

  </div>
</section>

<section class="order" id="order">
  <h2>Оформлення замовлення</h2>

  <select id="product">
    <option value="">Оберіть товар</option>
    <option value="black">Аромасвічка Чорна</option>
    <option value="white">Аромасвічка Біла</option>
  </select>

  <input id="name" placeholder="Ваше імʼя">
  <input id="phone" placeholder="Телефон">

  <button onclick="send()">Відправити</button>
</section>

<script>
function choose(p){
  document.getElementById('product').value = p;
  document.getElementById('order').scrollIntoView({behavior:'smooth'});
}

function send(){
  const token = '8309821481:AAFJUBalSpC1njbBzzyPu1yNet99zS3SHBU';
  const chat_id = '245672952';

  const p = document.getElementById('product').value;
  const n = document.getElementById('name').value;
  const ph = document.getElementById('phone').value;

  if(!p || !n || !ph){
    alert('Заповніть усі поля');
    return;
  }

  const text = `Замовлення Candles Home
Товар: ${p}
Імʼя: ${n}
Телефон: ${ph}`;

  fetch(`https://api.telegram.org/bot8309821481:AAFJUBalSpC1njbBzzyPu1yNet99zS3SHBU/sendMessage`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id:8629717657,
      text:text
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.ok){
      alert('Дякуємо за замовлення');
    }else{
      alert('Помилка');
    }
  })
  .catch(()=>alert('Помилка'));
}

// карусель
document.querySelectorAll('.carousel').forEach(carousel=>{
  let index = 0;
  const images = carousel.querySelectorAll('img');

  setInterval(()=>{
    images[index].classList.remove('active');
    index = (index + 1) % images.length;
    images[index].classList.add('active');
  }, 2500);
});
</script>

</body>
</html>
