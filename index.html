<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candles Home — інтер'єрні свічки</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:transparent;
  color:#fff;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('Loft.jpg') center/cover no-repeat;
  opacity:0.25;
  z-index:-2;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:-1;
}

.brand{
  position:relative;
  text-align:center;
  padding:110px 20px 80px;
  max-width:800px;
  margin:auto;
  border-radius:25px;
  overflow:hidden;
}

/* ФОН КАРТОЧКИ */
.brand::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('1.1.jpg') center/cover no-repeat;
  z-index:-2;
}

/* ЗАТЕМНЕНИЕ */
.brand::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:-1;
}
}
.brand h1{font-size:50px;margin-bottom:10px}
.brand p{color:#ccc;font-size:18px;margin-bottom:25px}

.brand .socials button{
  margin:5px 10px;
  border:none;
  border-radius:30px;
  padding:10px 22px;
  background:rgba(255,255,255,.15);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:.3s;
  backdrop-filter:blur(12px);
}
.brand .socials button:hover{
  background:rgba(255,255,255,.3);
  box-shadow:0 0 15px rgba(255,255,255,.4);
}

.section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}
.card{
  background:rgba(20,20,20,.65);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(10px);
  text-align:center;
  padding:25px;
  box-shadow:0 0 25px rgba(255,255,255,.05);
  transition:.3s;
}
.card:hover{transform:translateY(-5px)}

.carousel{
  position:relative;
  overflow:hidden;
  border-radius:15px;
  margin-bottom:15px;
}
.carousel img{
  width:100%;
  display:none;
}
.carousel img.active{
  display:block;
}

.card h3{font-size:22px;margin-bottom:5px}
.card p{color:#bbb;margin-bottom:10px;font-size:15px}
.price{font-weight:600;margin-bottom:15px}

button{
  background:rgba(255,255,255,.15);
  color:#fff;
  border:none;
  border-radius:15px;
  padding:12px 25px;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  background:rgba(255,255,255,.3);
  box-shadow:0 0 18px rgba(255,255,255,.4);
  transform:translateY(-2px);
}

.order{
  background:rgba(20,20,20,.7);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:24px;
  max-width:500px;
  margin:50px auto 80px;
  text-align:center;
}
.order h2{margin-bottom:25px}

input,select{
  width:100%;
  padding:13px;
  margin:8px 0;
  background:#222;
  border:none;
  color:#fff;
  border-radius:10px;
  font-size:16px;
}

.send{
  background:#0071e3;
  color:#fff;
  border:none;
  border-radius:14px;
  padding:13px;
  width:100%;
  font-size:17px;
  cursor:pointer;
  transition:.3s;
  margin-top:5px;
}
.send:hover{
  background:#005bbf;
  box-shadow:0 0 20px rgba(0,113,227,.5);
  transform:translateY(-2px);
}

footer{
  text-align:center;
  color:#777;
  font-size:14px;
  margin-bottom:40px;
}

.instagram{
  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}
.telegram{
  background:#229ED9;
}
</style>
</head>

<body>

<section class="brand">
  <h1>Candles Home</h1>
  <p>Твій простір заслуговує більше, ніж просто світло</p>
  <div class="socials">
    <button onclick="window.open('https://t.me/Candles_Home_UA')">Telegram</button>
    <button onclick="window.open('https://www.instagram.com/candleshome.store')">Instagram</button>
  </div>
</section>

<section class="section">
  <div class="grid">

    <div class="card">
      <div class="carousel">
        <img src="black1.jpg" class="active">
        <img src="black2.jpg">
        <img src="black3.jpg">
      </div>
      <h3>Аромасвічка з таємним написом</h3>
      <p>Чорна</p>
      <div class="price">180 грн</div>
      <button onclick="choose('black')">Обрати</button>
    </div>

    <div class="card">
      <div class="carousel">
        <img src="white1.jpg" class="active">
        <img src="white2.jpg">
        <img src="white3.jpg">
      </div>
      <h3>Аромасвічка з таємним написом</h3>
      <p>Біла</p>
      <div class="price">180 грн</div>
      <button onclick="choose('white')">Обрати</button>
    </div>

  </div>
</section>

<section class="order" id="order">
  <h2>Оформлення замовлення</h2>

<select id="product">
  <option value="">Оберіть товар</option>
  <option value="black">Аромасвічка Чорна</option>
  <option value="white">Аромасвічка Біла</option>
</select>
  <button class="send" onclick="send()">Відправити</button>
</section>

<footer>© 2026 Candles Home</footer>

<script>
function choose(p){
  document.getElementById('product').value = p;
  document.getElementById('order').scrollIntoView({behavior:'smooth'});
  </script>
}
<script>
function send(){
  const token = '8309821481:AAFJUBalSpC1njbBzzyPu1yNet99zS3SHBU';
  const chat_id = '245672952';

  const p = document.getElementById('product').value;
  const n = document.getElementById('name').value;
  const ph = document.getElementById('phone').value;

  if(!p || !n || !ph){
    alert('Заповніть усі поля');
    return;
  }

  const text = `Замовлення Candles Home
Товар: ${p}
Імʼя: ${n}
Телефон: ${ph}`;

  fetch(`https://api.telegram.org/bot8309821481:AAFJUBalSpC1njbBzzyPu1yNet99zS3SHBU/sendMessage`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      chat_id: 245672952,
      text: text
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.ok){
      alert('Дякуємо за замовлення');
    } else {
      alert('Помилка');
    }
  })
  .catch(() => alert('Помилка'));
}
</script>
}
  
<script>
document.querySelectorAll('.carousel').forEach(carousel=>{
  let index = 0;
  const images = carousel.querySelectorAll('img');

  setInterval(()=>{
    images[index].classList.remove('active');
    index = (index + 1) % images.length;
    images[index].classList.add('active');
  }, 2500);
});
</script>

</body>
</html>
